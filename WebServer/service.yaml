apiVersion: v1
kind: Service
metadata:
  name: clearroots-web-service
  namespace: default
  labels:
    app: clearroots-web
spec:
  type: NodePort
  selector:
    app: clearroots-web
  ports:
  - protocol: TCP
    port: 80           # Cluster içi port
    targetPort: 80     # Container port
    nodePort: 30080    # Dışarıdan erişim portu (30000-32767 arası)
