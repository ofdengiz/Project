apiVersion: apps/v1
kind: Deployment
metadata:
  name: clearroots-web
  namespace: default
  labels:
    app: clearroots-web
    project: clearroots-foundation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clearroots-web
  template:
    metadata:
      labels:
        app: clearroots-web
    spec:
      containers:
      - name: clearroots-web
        image: docker.io/library/clearroots-web:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
